<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Star Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 8px; }
        .panel { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .sidebar { width: 200px; flex-shrink: 0; }
        .main { flex: 1; }
        .date-item { padding: 8px 12px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; }
        .date-item:hover, .date-item.active { background: #21262d; color: #58a6ff; }
        .section { margin-bottom: 24px; }
        .section h2 { border-bottom: 1px solid #21262d; padding-bottom: 8px; margin-bottom: 12px; }
        .repo-card { padding: 12px; border: 1px solid #21262d; border-radius: 6px; margin-bottom: 8px; }
        .repo-card:hover { background: #161b22; }
        .repo-name { color: #58a6ff; text-decoration: none; font-weight: 600; }
        .repo-name:hover { text-decoration: underline; }
        .repo-meta { font-size: 0.85em; color: #8b949e; margin-top: 4px; }
        .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; margin-right: 4px; }
        .tag-fire { background: #da3633; color: #fff; }
        .tag-new { background: #238636; color: #fff; }
        .tag-quality { background: #1f6feb; color: #fff; }
        .tag-enterprise { background: #8957e5; color: #fff; }
        .search-bar { margin-bottom: 16px; }
        .search-bar input { width: 100%; padding: 10px 16px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 1em; }
        .search-bar input:focus { outline: none; border-color: #58a6ff; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .error { text-align: center; padding: 40px; color: #f85149; }
    </style>
</head>
<body>
    <h1>🚀 GitHub Star Tracker</h1>
    <p style="color:#8b949e;margin-bottom:24px;">开源项目趋势追踪面板</p>

    <div class="search-bar">
        <input type="text" id="search" placeholder="搜索项目名或标签..." oninput="filterRepos()">
    </div>

    <div class="panel">
        <div class="sidebar">
            <h3 style="margin-bottom:12px">📅 历史日期</h3>
            <div id="date-list"></div>
        </div>
        <div class="main" id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let currentData = null;

        async function init() {
            await loadLatest();
        }

        async function loadLatest() {
            try {
                const resp = await fetch('data/latest.json');
                if (!resp.ok) throw new Error('No data');
                currentData = await resp.json();
                render();
                document.getElementById('date-list').innerHTML =
                    '<div class="date-item active">最新 (' + currentData.date + ')</div>';
            } catch(e) {
                document.getElementById('content').innerHTML =
                    '<div class="error">暂无数据，请等待 Action 首次运行后生成。</div>';
            }
        }

        function filterRepos() {
            render(document.getElementById('search').value.toLowerCase());
        }

        function render(filter) {
            if (!arguments.length) filter = '';
            if (!currentData) return;
            var candidates = currentData.candidates;
            var stats = currentData.stats;
            var filtered = filter ? candidates.filter(function(c) {
                return c.repo.toLowerCase().indexOf(filter) !== -1 ||
                       (c.one_liner || '').toLowerCase().indexOf(filter) !== -1;
            }) : candidates;

            var tagClass = {
                '🔥爆发中': 'tag-fire', '🌱新星': 'tag-new',
                '✅高质量': 'tag-quality', '🏢大厂背书': 'tag-enterprise'
            };

            function renderRepos(list) {
                return list.map(function(r) {
                    var tags = (r.labels || []).map(function(l) {
                        return '<span class="tag ' + (tagClass[l] || '') + '">' + l + '</span>';
                    }).join('');
                    return '<div class="repo-card">' +
                        '<a class="repo-name" href="https://github.com/' + r.repo + '" target="_blank">' + r.repo + '</a>' +
                        '<span style="float:right;color:#8b949e">⭐ ' + r.stars +
                        ' | +' + (r.star_delta_1d || 0) + '/日 +' + (r.star_delta_7d || 0) + '/周 | ' +
                        (r.score || 0) + '分</span>' +
                        '<div class="repo-meta">' + tags + ' ' + (r.one_liner || '') + '</div>' +
                        '</div>';
                }).join('');
            }

            var topDay = (stats && stats.top_day) ? stats.top_day.slice(0, 10) : filtered.slice(0, 10);
            var topWeek = (stats && stats.top_week) ? stats.top_week.slice(0, 10) : filtered.slice(0, 10);
            var newStars = (stats && stats.new_stars) ? stats.new_stars.slice(0, 10) : [];

            document.getElementById('content').innerHTML =
                '<div class="section"><h2>🔥 今日增速 TOP 10</h2>' + renderRepos(topDay) + '</div>' +
                '<div class="section"><h2>💥 本周爆发榜</h2>' + renderRepos(topWeek) + '</div>' +
                '<div class="section"><h2>🌱 潜力新星</h2>' + (newStars.length ? renderRepos(newStars) : '<p style="color:#8b949e">暂无</p>') + '</div>' +
                '<p style="color:#8b949e;text-align:center;margin-top:24px">' + currentData.date + '</p>';
        }

        init();
    </script>
</body>
</html>

name: GitHub Star Tracker

on:
  schedule:
    - cron: '7 */6 * * *'
    - cron: '3 1 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config from secrets
        run: |
          cat > config.yaml << 'YEOF'
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          tracking:
            languages: ["all"]
            min_stars: 100
            new_repo_days: 90
            new_repo_min_stars: 500
            top_n_candidates: 50
            org_whitelist:
              - google
              - meta
              - anthropic
              - bytedance
              - alibaba
              - microsoft
              - openai
              - deepseek-ai
          push:
            email:
              enabled: false
            wechat:
              enabled: false
            feishu:
              enabled: false
          YEOF

      - name: Run tracker
        run: python src/main.py --fetch

      - name: Generate web panel data
        run: python src/main.py --report

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/data/
          git diff --staged --quiet || git commit -m "data: auto snapshot $(date -Iminutes)"
          git push
